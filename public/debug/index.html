<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anivexa API Tester</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101113;
        --panel: #181a1f;
        --panel-2: #20232a;
        --text: #f3f5f7;
        --muted: #a7afb9;
        --line: #30343d;
        --accent: #70d6b3;
        --accent-2: #8fb8ff;
        --danger: #ff7b8a;
        --ok: #7be3a2;
        --warn: #ffd479;
        --shadow: 0 20px 70px rgba(0, 0, 0, 0.28);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(112, 214, 179, 0.14), transparent 34rem),
          linear-gradient(135deg, #101113 0%, #15161b 48%, #11151a 100%);
        color: var(--text);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1380px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      .top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(30px, 5vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        max-width: 720px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 7px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--warn);
        box-shadow: 0 0 18px currentColor;
      }

      .dot.ok {
        background: var(--ok);
      }

      .dot.bad {
        background: var(--danger);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(330px, 430px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(24, 26, 31, 0.9);
        box-shadow: var(--shadow);
      }

      .panel-pad {
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #111318;
        color: var(--text);
        outline: none;
      }

      input,
      select {
        min-height: 42px;
        padding: 0 12px;
      }

      textarea {
        min-height: 108px;
        resize: vertical;
        padding: 12px;
        line-height: 1.45;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(112, 214, 179, 0.12);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        background: var(--panel-2);
        color: var(--text);
      }

      .btn.primary {
        border-color: rgba(112, 214, 179, 0.65);
        background: linear-gradient(180deg, #7de0be, #4fb892);
        color: #07110d;
        font-weight: 750;
      }

      .btn:hover {
        filter: brightness(1.08);
      }

      .method-url {
        display: grid;
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 10px;
      }

      .urlbar {
        display: flex;
        align-items: center;
        min-height: 48px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: #111318;
      }

      .urlbar code {
        display: block;
        width: 100%;
        padding: 14px 18px;
        overflow: auto;
        color: var(--accent-2);
        white-space: nowrap;
      }

      .response-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status-code {
        color: var(--muted);
      }

      .status-code.good {
        color: var(--ok);
      }

      .status-code.bad {
        color: var(--danger);
      }

      pre {
        min-height: 520px;
        max-height: 68vh;
        margin: 0;
        padding: 18px;
        overflow: auto;
        border-top: 1px solid var(--line);
        background: #0c0e12;
        color: #eaf1f8;
        font: 13px/1.55 "Cascadia Code", Consolas, Monaco, monospace;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .quick {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .quick button,
      .history button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #111318;
        color: var(--text);
        text-align: left;
        padding: 8px 10px;
      }

      .quick small,
      .history small {
        display: block;
        color: var(--muted);
        margin-top: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history {
        display: grid;
        gap: 8px;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 920px) {
        .top,
        .layout {
          grid-template-columns: 1fr;
        }

        .top {
          display: grid;
          align-items: start;
        }
      }

      @media (max-width: 560px) {
        .shell {
          width: min(100% - 20px, 1380px);
          padding: 18px 0;
        }

        .row,
        .method-url,
        .quick {
          grid-template-columns: 1fr;
        }

        .response-head {
          align-items: flex-start;
          flex-direction: column;
        }

        pre {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <div>
          <h1>Anivexa API Tester</h1>
          <p class="subtitle">Build requests for the local API, send them from the browser, and inspect the response without needing Postman or curl.</p>
        </div>
        <div class="pill" id="serverState"><span class="dot"></span><span>Not checked</span></div>
      </header>

      <main class="layout">
        <section class="panel panel-pad stack" aria-label="Request builder">
          <label>
            API base URL
            <input id="baseUrl" value="" placeholder="http://localhost:4000">
          </label>

          <div class="method-url">
            <label>
              Method
              <select id="method">
                <option>GET</option>
                <option>OPTIONS</option>
              </select>
            </label>
            <label>
              Endpoint
              <select id="endpoint"></select>
            </label>
          </div>

          <div id="params" class="stack"></div>

          <label id="rawPathWrap">
            Custom path
            <input id="rawPath" placeholder="/map/21">
          </label>

          <label>
            Query params
            <textarea id="queryText" spellcheck="false" placeholder="page=1&#10;perPage=24"></textarea>
          </label>

          <div class="actions">
            <button class="btn primary" id="sendBtn" type="button">Send request</button>
            <button class="btn" id="copyUrlBtn" type="button">Copy URL</button>
            <button class="btn" id="copyCurlBtn" type="button">Copy curl</button>
            <button class="btn" id="healthBtn" type="button">Check root</button>
          </div>

          <p class="hint" id="endpointHint"></p>

          <div>
            <p class="hint">Quick requests</p>
            <div class="quick" id="quick"></div>
          </div>

          <div>
            <p class="hint">History</p>
            <div class="history" id="history"></div>
          </div>
        </section>

        <section class="panel" aria-label="Response viewer">
          <div class="response-head">
            <div class="stats">
              <span class="pill status-code" id="statusCode">Idle</span>
              <span class="pill" id="duration">0 ms</span>
              <span class="pill" id="size">0 B</span>
            </div>
            <div class="actions">
              <button class="btn" id="copyResponseBtn" type="button">Copy response</button>
              <button class="btn" id="clearBtn" type="button">Clear</button>
            </div>
          </div>
          <div class="urlbar"><code id="requestUrl">Select an endpoint and send a request.</code></div>
          <pre id="response">{}</pre>
        </section>
      </main>
    </div>

    <script>
      const endpoints = [
        {
          id: "root",
          label: "Root info",
          path: "/",
          hint: "Returns API metadata, provider names, and route templates.",
        },
        {
          id: "home",
          label: "Home feed",
          path: "/home",
          hint: "Returns grouped discovery lists for the home screen.",
        },
        {
          id: "popular",
          label: "Popular",
          path: "/popular",
          query: { page: "1", perPage: "24" },
          hint: "Popular anime from AniList.",
        },
        {
          id: "airing",
          label: "Currently airing",
          path: "/airing",
          query: { page: "1", perPage: "24" },
          hint: "Currently airing anime from AniList.",
        },
        {
          id: "search",
          label: "Search",
          path: "/search",
          query: { q: "frieren", page: "1", perPage: "24" },
          hint: "Search AniList titles. Change q to your test query.",
        },
        {
          id: "map",
          label: "ID map",
          path: "/map/{anilistId}",
          params: [{ key: "anilistId", label: "AniList ID", value: "21" }],
          hint: "Maps AniList IDs to MAL, TVDB, TMDB, Kitsu, AniDB, and other IDs.",
        },
        {
          id: "episodes",
          label: "Episodes",
          path: "/episodes/{anilistId}",
          params: [{ key: "anilistId", label: "AniList ID", value: "21" }],
          hint: "Fetches episode lists from every provider.",
        },
        {
          id: "watch",
          label: "Watch",
          path: "/watch/{provider}/{anilistId}/{audio}/{provider}-{episode}",
          params: [
            { key: "provider", label: "Provider", value: "reanime", type: "select", options: ["animepahe", "allmanga", "reanime", "anikoto", "animegg", "anineko", "anidbapp"] },
            { key: "anilistId", label: "AniList ID", value: "21" },
            { key: "audio", label: "Audio", value: "sub", type: "select", options: ["sub", "dub"] },
            { key: "episode", label: "Episode", value: "1" },
          ],
          hint: "Returns stream source data for one provider episode.",
        },
        {
          id: "reanimeStream",
          label: "Reanime stream redirect",
          path: "/stream/reanime/{anilistId}/{audio}/{episode}",
          params: [
            { key: "anilistId", label: "AniList ID", value: "21" },
            { key: "audio", label: "Audio", value: "sub", type: "select", options: ["sub", "dub"] },
            { key: "episode", label: "Episode", value: "1" },
          ],
          hint: "Redirects directly to a Reanime HLS stream when available.",
        },
        {
          id: "proxy",
          label: "Proxy",
          path: "/proxy",
          query: { url: "https://example.com/playlist.m3u8", referer: "" },
          hint: "Proxies stream assets and rewrites HLS playlists.",
        },
        {
          id: "custom",
          label: "Custom",
          path: "",
          custom: true,
          hint: "Enter any path manually, including query params.",
        },
      ];

      const quickIds = ["root", "home", "popular", "search", "map", "episodes"];
      const history = [];
      const els = {
        baseUrl: document.querySelector("#baseUrl"),
        method: document.querySelector("#method"),
        endpoint: document.querySelector("#endpoint"),
        params: document.querySelector("#params"),
        rawPathWrap: document.querySelector("#rawPathWrap"),
        rawPath: document.querySelector("#rawPath"),
        queryText: document.querySelector("#queryText"),
        sendBtn: document.querySelector("#sendBtn"),
        copyUrlBtn: document.querySelector("#copyUrlBtn"),
        copyCurlBtn: document.querySelector("#copyCurlBtn"),
        copyResponseBtn: document.querySelector("#copyResponseBtn"),
        clearBtn: document.querySelector("#clearBtn"),
        healthBtn: document.querySelector("#healthBtn"),
        endpointHint: document.querySelector("#endpointHint"),
        quick: document.querySelector("#quick"),
        history: document.querySelector("#history"),
        serverState: document.querySelector("#serverState"),
        statusCode: document.querySelector("#statusCode"),
        duration: document.querySelector("#duration"),
        size: document.querySelector("#size"),
        requestUrl: document.querySelector("#requestUrl"),
        response: document.querySelector("#response"),
      };

      let currentResponseText = "{}";

      function defaultBaseUrl() {
        if (location.protocol === "http:" || location.protocol === "https:") return location.origin;
        return "http://localhost:4000";
      }

      function endpointById(id) {
        return endpoints.find((item) => item.id === id) || endpoints[0];
      }

      function setResponse(text, status = "Idle", duration = "0 ms", size = "0 B", ok = null) {
        currentResponseText = text;
        els.response.textContent = text;
        els.statusCode.textContent = status;
        els.duration.textContent = duration;
        els.size.textContent = size;
        els.statusCode.classList.toggle("good", ok === true);
        els.statusCode.classList.toggle("bad", ok === false);
      }

      function setServerState(label, state) {
        const dot = els.serverState.querySelector(".dot");
        els.serverState.querySelector("span:last-child").textContent = label;
        dot.classList.toggle("ok", state === "ok");
        dot.classList.toggle("bad", state === "bad");
      }

      function parseQueryText(text) {
        const params = new URLSearchParams();
        text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean).forEach((line) => {
          const normalized = line.startsWith("?") ? line.slice(1) : line;
          for (const pair of normalized.split("&")) {
            if (!pair) continue;
            const index = pair.indexOf("=");
            if (index === -1) {
              params.set(pair.trim(), "");
            } else {
              params.set(pair.slice(0, index).trim(), pair.slice(index + 1).trim());
            }
          }
        });
        return params;
      }

      function formatQuery(query = {}) {
        return Object.entries(query).map(([key, value]) => `${key}=${value}`).join("\n");
      }

      function renderEndpointOptions() {
        els.endpoint.innerHTML = endpoints.map((endpoint) => `<option value="${endpoint.id}">${endpoint.label}</option>`).join("");
      }

      function renderParams(endpoint) {
        els.params.innerHTML = "";
        els.rawPathWrap.classList.toggle("hidden", !endpoint.custom);
        els.endpointHint.textContent = endpoint.hint || "";

        for (const param of endpoint.params || []) {
          const label = document.createElement("label");
          label.textContent = param.label;
          let input;
          if (param.type === "select") {
            input = document.createElement("select");
            input.innerHTML = param.options.map((option) => `<option value="${option}">${option}</option>`).join("");
          } else {
            input = document.createElement("input");
          }
          input.dataset.param = param.key;
          input.value = param.value || "";
          input.addEventListener("input", updateUrlPreview);
          input.addEventListener("change", updateUrlPreview);
          label.append(input);
          els.params.append(label);
        }

        els.queryText.value = formatQuery(endpoint.query);
        if (endpoint.custom && !els.rawPath.value) els.rawPath.value = "/map/21";
        updateUrlPreview();
      }

      function getParamValues() {
        return [...els.params.querySelectorAll("[data-param]")].reduce((acc, input) => {
          acc[input.dataset.param] = input.value.trim();
          return acc;
        }, {});
      }

      function buildPath() {
        const endpoint = endpointById(els.endpoint.value);
        let path = endpoint.custom ? els.rawPath.value.trim() || "/" : endpoint.path;
        const values = getParamValues();
        for (const [key, value] of Object.entries(values)) {
          path = path.replaceAll(`{${key}}`, encodeURIComponent(value));
        }
        if (!path.startsWith("/")) path = `/${path}`;
        return path;
      }

      function buildUrl() {
        const base = els.baseUrl.value.trim() || defaultBaseUrl();
        const url = new URL(buildPath(), base.endsWith("/") ? base : `${base}/`);
        const typedPath = buildPath();
        const typedQueryIndex = typedPath.indexOf("?");
        if (typedQueryIndex >= 0) {
          url.pathname = typedPath.slice(0, typedQueryIndex);
          new URLSearchParams(typedPath.slice(typedQueryIndex + 1)).forEach((value, key) => url.searchParams.set(key, value));
        }
        parseQueryText(els.queryText.value).forEach((value, key) => url.searchParams.set(key, value));
        return url;
      }

      function updateUrlPreview() {
        try {
          els.requestUrl.textContent = buildUrl().toString();
        } catch (err) {
          els.requestUrl.textContent = err.message;
        }
      }

      async function copy(text) {
        await navigator.clipboard.writeText(text);
      }

      function formatBody(text, contentType) {
        if (contentType.includes("application/json")) {
          try {
            return JSON.stringify(JSON.parse(text), null, 2);
          } catch {}
        }
        return text || "(empty response)";
      }

      function responseSize(text) {
        const bytes = new Blob([text]).size;
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function renderHistory() {
        els.history.innerHTML = "";
        for (const item of history.slice(0, 6)) {
          const button = document.createElement("button");
          button.type = "button";
          button.innerHTML = `<strong>${item.status} ${item.method}</strong><small>${item.url}</small>`;
          button.addEventListener("click", () => {
            els.method.value = item.method;
            els.endpoint.value = "custom";
            renderParams(endpointById("custom"));
            const url = new URL(item.url);
            els.baseUrl.value = url.origin;
            els.rawPath.value = `${url.pathname}${url.search}`;
            els.queryText.value = "";
            updateUrlPreview();
          });
          els.history.append(button);
        }
      }

      async function sendRequest() {
        let url;
        try {
          url = buildUrl();
        } catch (err) {
          setResponse(err.message, "Invalid URL", "0 ms", "0 B", false);
          return;
        }

        const started = performance.now();
        els.sendBtn.disabled = true;
        els.requestUrl.textContent = url.toString();
        setResponse("Loading...", "Pending", "0 ms", "0 B", null);

        try {
          const response = await fetch(url, { method: els.method.value });
          const raw = await response.text();
          const elapsed = `${Math.round(performance.now() - started)} ms`;
          const text = formatBody(raw, response.headers.get("content-type") || "");
          setResponse(text, `${response.status} ${response.statusText}`, elapsed, responseSize(raw), response.ok);
          setServerState(response.ok ? "Reachable" : "Responded with error", response.ok ? "ok" : "bad");
          history.unshift({ method: els.method.value, status: response.status, url: url.toString() });
          renderHistory();
        } catch (err) {
          const elapsed = `${Math.round(performance.now() - started)} ms`;
          setResponse(err.stack || err.message, "Network error", elapsed, "0 B", false);
          setServerState("Network error", "bad");
        } finally {
          els.sendBtn.disabled = false;
        }
      }

      function renderQuick() {
        els.quick.innerHTML = "";
        quickIds.map(endpointById).forEach((endpoint) => {
          const button = document.createElement("button");
          button.type = "button";
          button.innerHTML = `<strong>${endpoint.label}</strong><small>${endpoint.path || "/custom"}</small>`;
          button.addEventListener("click", () => {
            els.endpoint.value = endpoint.id;
            renderParams(endpoint);
            sendRequest();
          });
          els.quick.append(button);
        });
      }

      renderEndpointOptions();
      els.baseUrl.value = defaultBaseUrl();
      renderParams(endpointById("root"));
      renderQuick();
      updateUrlPreview();

      els.endpoint.addEventListener("change", () => renderParams(endpointById(els.endpoint.value)));
      els.baseUrl.addEventListener("input", updateUrlPreview);
      els.method.addEventListener("change", updateUrlPreview);
      els.rawPath.addEventListener("input", updateUrlPreview);
      els.queryText.addEventListener("input", updateUrlPreview);
      els.sendBtn.addEventListener("click", sendRequest);
      els.healthBtn.addEventListener("click", () => {
        els.endpoint.value = "root";
        renderParams(endpointById("root"));
        sendRequest();
      });
      els.copyUrlBtn.addEventListener("click", () => copy(buildUrl().toString()));
      els.copyCurlBtn.addEventListener("click", () => {
        const url = buildUrl().toString().replaceAll("'", "'\\''");
        copy(`curl -X ${els.method.value} '${url}'`);
      });
      els.copyResponseBtn.addEventListener("click", () => copy(currentResponseText));
      els.clearBtn.addEventListener("click", () => setResponse("{}", "Idle", "0 ms", "0 B", null));
    </script>
  </body>
</html>
